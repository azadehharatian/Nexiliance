<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Authenticated CRA Demo</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/assessment.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Guard: only allow access when a JWT token is present in localStorage
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('jwt_token');
      if (!token) {
        // No token – redirect to a (hypothetical) login page and preserve the original URL
        const returnUrl = encodeURIComponent(window.location.pathname + window.location.search);
        window.location.href = `/login.html?next=${returnUrl}`;
        return;
      }
      // Token exists – the rest of the demo logic (assessment.js) will run as normal.
    });
  </script>
</head>
<body>
  <!-- The UI is identical to demo.html – the script in assessment.js will populate the app -->
  <div id="app"></div>
  <script src="js/demo_logic.js"></script>
</body>
</html>
